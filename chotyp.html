<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn từ để gõ - App từ vựng</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #fff;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .back-button {
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background-color: #555;
        }

        /* Phần thống kê mới */
        .stats-overview {
            background-color: #1a1a2e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .stat-item .label {
            color: #aaa;
        }

        .stat-item .value {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .stat-item .value.due {
            color: #ffa726;
        }

        .stat-item .value.level0 {
            color: #4fc3f7;
        }

        .stat-item .value.total {
            color: #fff;
        }

        .word-list {
            margin-top: 20px;
        }

        .word-item {
            background-color: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-item:hover {
            background-color: #2a2a2a;
        }

        .word-content {
            display: flex;
            gap: 15px;
            align-items: center;
            flex: 1;
        }

        .word-en {
            font-weight: bold;
            color: #1a73e8;
            font-size: 1.1em;
            min-width: 120px;
        }

        .word-pronunciation {
            color: #ccc;
            font-size: 0.9em;
            min-width: 100px;
        }

        .word-meaning {
            color: #fff;
            flex: 1;
        }

        .word-level {
            color: #888;
            font-size: 0.9em;
            min-width: 50px;
            text-align: right;
        }

        .no-data {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }

        .warning-message {
            background-color: #333;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .study-button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .study-button:hover {
            background-color: #0d62d9;
        }

        .study-button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        .type-level {
            color: #4caf50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Chọn từ để gõ</h1>
            <a href="index.html" class="back-button">← Quay lại</a>
        </header>

        <!-- PHẦN THỐNG KÊ TỔNG THỂ -->
        <div class="stats-overview" id="statsOverview">
            <div class="stat-item">
                <span class="label">📚 Tổng từ:</span>
                <span class="value total" id="totalWords">0</span>
            </div>
            <div class="stat-item">
                <span class="label">⏰ Đến hạn:</span>
                <span class="value due" id="dueWords">0</span>
            </div>
            <div class="stat-item">
                <span class="label">🆕 Level 0:</span>
                <span class="value level0" id="level0Words">0</span>
            </div>
        </div>

        <div id="warningMessage" class="warning-message hidden">
            <!-- Thông báo cảnh báo sẽ hiện ở đây -->
        </div>

        <div class="word-list" id="wordList">
            <!-- Danh sách từ sẽ hiện ở đây -->
        </div>

        <button class="study-button" id="studyButton" disabled>Bắt đầu gõ từ</button>
    </div>

    <script>
        // Lấy danh sách từ vựng
        function getVocabularies() {
            return JSON.parse(localStorage.getItem('vocabularies')) || [];
        }

        // Hàm cập nhật thống kê tổng thể - ĐÃ SỬA
        function updateStats() {
            const allVocab = getVocabularies();
            const now = Date.now();

            const total = allVocab.length;
            // CHỈ TÍNH ĐẾN HẠN CHO CÁC TỪ LEVEL >= 1
            const due = allVocab.filter(v => (v.tl || 0) > 0 && (v.tnt || 0) <= now).length;
            const level0 = allVocab.filter(v => (v.tl || 0) === 0).length;

            document.getElementById('totalWords').textContent = total;
            document.getElementById('dueWords').textContent = due;
            document.getElementById('level0Words').textContent = level0;
        }

        // Kiểm tra từ có cần ôn tập cho chế độ gõ không (vẫn bao gồm level 0)
        function needsTypeReview(vocab) {
            // Level 0 luôn cần học
            if ((vocab.tl || 0) === 0) return true;
            const now = Date.now();
            return now >= (vocab.tnt || 0);
        }

        // Lấy từ vựng cần học cho chế độ gõ - LỌC TỪ TRÙNG, GIỚI HẠN 7 TỪ
        function getWordsToType() {
            const allVocabularies = getVocabularies();
            
            let wordsToType = allVocabularies.filter(vocab => needsTypeReview(vocab));

            // Lọc bỏ từ trùng (giữ 1 từ cho mỗi từ tiếng Anh)
            const uniqueWords = new Map();
            wordsToType.forEach(vocab => {
                if (!uniqueWords.has(vocab.w)) {
                    uniqueWords.set(vocab.w, vocab);
                }
            });
            wordsToType = Array.from(uniqueWords.values());

            // Sắp xếp theo ưu tiên
            wordsToType.sort((a, b) => {
                if ((a.tl || 0) > 0 && (b.tl || 0) > 0) {
                    if ((a.tl || 0) === (b.tl || 0)) {
                        return (a.tlt || 0) - (b.tlt || 0);
                    }
                    return (a.tl || 0) - (b.tl || 0);
                }
                if ((a.tl || 0) > 0 && (b.tl || 0) === 0) return -1;
                if ((b.tl || 0) > 0 && (a.tl || 0) === 0) return 1;
                if (a.s !== b.s) {
                    return a.s.localeCompare(b.s);
                }
                return 0;
            });

            // Giới hạn 7 từ
            return wordsToType.slice(0, 7);
        }

        // Phát âm từ
        function playWordPronunciation(word) {
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        // Hiển thị danh sách từ để gõ
        function displayWordsToType() {
            const wordList = document.getElementById('wordList');
            const warningMessage = document.getElementById('warningMessage');
            const studyButton = document.getElementById('studyButton');

            const wordsToType = getWordsToType();

            if (wordsToType.length === 0) {
                warningMessage.innerHTML = 'Không có từ nào để gõ. Cần nạp thêm từ mới!';
                warningMessage.classList.remove('hidden');
                studyButton.disabled = true;
            } else {
                warningMessage.classList.add('hidden');
                studyButton.disabled = false;
            }

            if (wordsToType.length === 0) {
                wordList.innerHTML = '<div class="no-data">Không có từ nào để gõ</div>';
                return;
            }

            wordList.innerHTML = wordsToType.map(word => {
                const typeLevel = word.tl || 0;
                return `
                    <div class="word-item" onclick="playWordPronunciation('${word.w}')">
                        <div class="word-content">
                            <div class="word-en">${word.w}</div>
                            <div class="word-pronunciation">${word.p || ''}</div>
                            <div class="word-meaning">${word.m || ''}</div>
                        </div>
                        <div class="word-level">
                            <span class="type-level">T-Lv:${typeLevel}</span>
                        </div>
                    </div>
                `;
            }).join('');

            studyButton.textContent = `Bắt đầu gõ từ (${wordsToType.length} từ)`;
        }

        // Khởi chạy
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();          // Cập nhật thống kê ngay khi load
            displayWordsToType();

            // Gắn sự kiện nút Study
            document.getElementById('studyButton').addEventListener('click', function() {
                const selectedWords = getWordsToType();
                if (selectedWords.length === 0) {
                    alert('Không có từ nào để gõ!');
                    return;
                }
                localStorage.setItem('selectedTypeWords', JSON.stringify(selectedWords));
                window.location.href = 'typwor.html';
            });
        });

        // TẠO DỮ LIỆU TEST TỰ ĐỘNG NẾU CHƯA CÓ (với các trường type)
        setTimeout(() => {
            const existingVocab = getVocabularies();
            if (existingVocab.length === 0) {
                const testData = [
                    {w: "Apple", m: "quả táo", p: "/ˈæp.əl/", tl: 1, tlt: Date.now() - 86400000, tnt: Date.now()},
                    {w: "Computer", m: "máy tính", p: "/kəmˈpjuː.tər/", tl: 1, tlt: Date.now() - 172800000, tnt: Date.now()},
                    {w: "Hello", m: "xin chào", p: "/heˈləʊ/", tl: 0, tlt: 0, tnt: 0},
                    {w: "Book", m: "sách", p: "/bʊk/", tl: 2, tlt: Date.now() - 259200000, tnt: Date.now()},
                    {w: "Pen", m: "bút", p: "/pen/", tl: 1, tlt: Date.now() - 86400000, tnt: Date.now()},
                    {w: "Phone", m: "điện thoại", p: "/fəʊn/", tl: 0, tlt: 0, tnt: 0},
                    {w: "Table", m: "cái bàn", p: "/ˈteɪ.bəl/", tl: 1, tlt: Date.now() - 432000000, tnt: Date.now()},
                    {w: "Chair", m: "cái ghế", p: "/tʃeər/", tl: 0, tlt: 0, tnt: 0}
                ];
                localStorage.setItem('vocabularies', JSON.stringify(testData));
                console.log('✅ Đã tạo dữ liệu test tự động cho chế độ gõ');
                updateStats();
                displayWordsToType();
            }
        }, 1000);
    </script>
</body>
</html>
