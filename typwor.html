<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Luyện gõ từ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 15px;
            padding-top: 10px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .session-stats {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #888;
            font-size: 0.9rem;
            min-height: 20px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 8px 12px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 50px;
            -webkit-appearance: none;
        }
        
        .control-btn:hover, .control-btn:active {
            background: #444;
        }
        
        .control-btn.active {
            background: #555;
            border-color: #777;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            background: #333;
            min-width: 70px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 10;
            border-radius: 6px;
            overflow: hidden;
            top: 100%;
            left: 0;
            margin-top: 5px;
        }
        
        .dropdown-content button {
            color: white;
            padding: 8px 12px;
            text-decoration: none;
            display: block;
            width: 100%;
            border: none;
            background: #333;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        
        .dropdown-content button:hover, .dropdown-content button:active {
            background: #444;
        }
        
        .dropdown.active .dropdown-content {
            display: block;
        }
        
        .word-display {
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.3;
        }
        
        .word-en {
            font-size: 1.5rem;
            color: #1a73e8;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .meaning {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .phonetic {
            font-size: 1rem;
            color: #666;
            margin-bottom: 10px;
        }
        
        .typing-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            margin-top: 10px;
        }
        
        .input-display {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 10px;
            cursor: pointer;
            border: 2px dashed #333;
            border-radius: 10px;
            padding: 15px;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .input-display:focus {
            outline: none;
            border-color: #1a73e8;
        }
        
        .letter {
            display: inline-block;
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.3s;
            background: #1a1a1a;
            border: 1px solid #333;
            min-width: 40px;
            text-align: center;
            font-weight: bold;
        }
        
        .letter.correct {
            background: #1a331a;
            border-color: #2d5a2d;
            color: #4caf50;
        }
        
        .letter.incorrect {
            background: #331a1a;
            border-color: #5a2d2d;
            color: #f44336;
        }
        
        .letter.fixed {
            background: #333311;
            border-color: #5a5a2d;
            color: #ffeb3b;
        }
        
        .letter.current {
            background: #1a1a33;
            border-color: #2d2d5a;
        }
        
        .letter.special {
            background: transparent;
            border: none;
            color: #888;
            min-width: auto;
            padding: 0 8px;
            font-weight: normal;
        }
        
        .letter.space {
            background: transparent;
            border: 1px dashed #444;
            color: #888;
            min-width: 60px;
            padding: 10px 5px;
            font-weight: normal;
        }
        
        .hidden-input {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            opacity: 0;
            pointer-events: none;
            border: none;
            background: transparent;
            font-size: 16px;
            z-index: 5;
        }

        .next-btn {
            z-index: 10;
            width: 100%;
            padding: 15px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-top: 10px;
            -webkit-appearance: none;
        }
        
        .next-btn:hover, .next-btn:active {
            background: #1976d2;
        }
        
        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .container {
                padding: 5px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .input-display {
                font-size: 1.5rem;
                gap: 5px;
                min-height: 70px;
            }
            
            .letter {
                padding: 8px 10px;
                min-width: 35px;
                font-size: 1.3rem;
            }
            
            .letter.space {
                min-width: 40px;
                padding: 8px 3px;
            }
            
            .control-btn {
                padding: 6px 10px;
                font-size: 0.8rem;
                min-width: 45px;
            }
            
            .word-en {
                font-size: 1.3rem;
            }
            
            .meaning {
                font-size: 1.1rem;
            }
            
            .session-stats {
                top: 10px;
                right: 10px;
                font-size: 0.8rem;
            }
            
            .hidden-input {
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Luyện gõ từ</h1>
        </header>
        
        <div class="session-stats" id="sessionStats"></div>
        
        <div class="controls">
            <button class="control-btn" id="vnBtn">VN</button>
            <button class="control-btn" id="enBtn">EN</button>
            <div class="dropdown">
                <button class="control-btn" id="speedBtn">1x</button>
                <div class="dropdown-content">
                    <button data-speed="0.5">0.5x</button>
                    <button data-speed="0.75">0.75x</button>
                    <button data-speed="1">1x</button>
                    <button data-speed="1.25">1.25x</button>
                    <button data-speed="1.5">1.5x</button>
                    <button data-speed="1.75">1.75x</button>
                </div>
            </div>
            <button class="control-btn" id="speakBtn">🔊</button>
        </div>
        
        <div class="word-display">
            <div class="word-en hidden" id="wordEn"></div>
            <div class="meaning hidden" id="meaning"></div>
            <div class="phonetic hidden" id="phonetic"></div>
        </div>
        
        <div class="typing-area">
            <div class="input-display" id="inputDisplay" tabindex="0"></div>
            <input type="text" id="hiddenInput" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            
            <button style="display:none" class="next-btn hidden" id="nextBtn">Next</button>
            <button style="display:none" class="next-btn hidden" id="finishBtn">Kết thúc</button>
        </div>
    </div>

    <script>
        // Biến toàn cục
        let words = [];
        let currentWordIndex = 0;
        let currentWord = null;
        let currentLetters = [];
        let resultProgress = [];
        let currentLetterIndex = 0;
        let isVnVisible = false;
        let isEnVisible = false;
        let speechRate = parseFloat(localStorage.getItem('speechRate') || '1.0');
        let isCompleted = false;
        let hasSpoken = false;

        // Lưu kết quả thực tế của từng từ
        let wordResults = {};

        // Đối tượng ánh xạ các phím thường bị nhầm lẫn
        const adjacentKeys = {
            'q': ['w', 'a', 's'],
            'w': ['q', 'e', 'a', 's', 'd'],
            'e': ['w', 'r', 's', 'd', 'f'],
            'r': ['e', 't', 'd', 'f', 'g'],
            't': ['r', 'y', 'f', 'g', 'h'],
            'y': ['t', 'u', 'g', 'h', 'j'],
            'u': ['y', 'i', 'h', 'j', 'k'],
            'i': ['u', 'o', 'j', 'k', 'l'],
            'o': ['i', 'p', 'k', 'l'],
            'p': ['o', 'l'],
            'a': ['q', 'w', 's', 'z', 'x'],
            's': ['q', 'w', 'e', 'a', 'd', 'z', 'x', 'c'],
            'd': ['w', 'e', 'r', 's', 'f', 'x', 'c', 'v'],
            'f': ['e', 'r', 't', 'd', 'g', 'c', 'v', 'b'],
            'g': ['r', 't', 'y', 'f', 'h', 'v', 'b', 'n'],
            'h': ['t', 'y', 'u', 'g', 'j', 'b', 'n', 'm'],
            'j': ['y', 'u', 'i', 'h', 'k', 'n', 'm'],
            'k': ['u', 'i', 'o', 'j', 'l', 'm'],
            'l': ['i', 'o', 'p', 'k'],
            'z': ['a', 's', 'x'],
            'x': ['a', 's', 'd', 'z', 'c'],
            'c': ['s', 'd', 'f', 'x', 'v'],
            'v': ['d', 'f', 'g', 'c', 'b'],
            'b': ['f', 'g', 'h', 'v', 'n'],
            'n': ['g', 'h', 'j', 'b', 'm'],
            'm': ['h', 'j', 'k', 'n']
        };

        // Hàm kiểm tra ký tự đặc biệt
        function isSpecialChar(char) {
            return /[\s\-'.,;:!?()]/.test(char);
        }

        // Hàm xác định loại ký tự đặc biệt để hiển thị
        function getSpecialCharDisplay(char) {
            if (char === ' ') {
                return { display: '␣', className: 'space' };
            }
            return { display: char, className: 'special' };
        }

        // DOM Elements
        const wordEnElement = document.getElementById('wordEn');
        const meaningElement = document.getElementById('meaning');
        const phoneticElement = document.getElementById('phonetic');
        const inputDisplayElement = document.getElementById('inputDisplay');
        const hiddenInput = document.getElementById('hiddenInput');
        const speakBtn = document.getElementById('speakBtn');
        const vnBtn = document.getElementById('vnBtn');
        const enBtn = document.getElementById('enBtn');
        const sessionStatsElement = document.getElementById('sessionStats');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const speedBtn = document.getElementById('speedBtn');
        const dropdown = document.querySelector('.dropdown');
        const speedOptions = document.querySelectorAll('.dropdown-content button');

        // Lấy danh sách từ vựng từ chotyp.html
        function getWordsToType() {
            // Lấy từ localStorage
            const selectedWords = JSON.parse(localStorage.getItem('selectedTypeWords')) || [];
            
            // Nếu không có từ, tạo dữ liệu mẫu với các từ có ký tự đặc biệt
            if (selectedWords.length === 0) {
                return [
                    {w: "Hello world", m: "xin chào thế giới", p: "/heˈləʊ wɜːrld/"},
                    {w: "Computer science", m: "khoa học máy tính", p: "/kəmˈpjuː.tər ˈsaɪ.əns/"},
                    {w: "Apple-pie", m: "bánh táo", p: "/ˈæp.əl paɪ/"},
                    {w: "Book-case", m: "kệ sách", p: "/bʊk keɪs/"},
                    {w: "Pen and paper", m: "bút và giấy", p: "/pen ənd ˈpeɪ.pər/"}
                ];
            }
            
            return selectedWords;
        }

        // Cập nhật thống kê
        function updateSessionStats() {
            const totalWords = words.length;
            const currentWordNum = currentWordIndex + 1;
            
            let correctCount = 0;
            let wrongCount = 0;
            
            // Tính kết quả thực tế từ wordResults
            Object.values(wordResults).forEach(result => {
                const results = result.split(',');
                let allCorrect = true;
                
                for (let i = 0; i < results.length; i++) {
                    if (results[i] !== '4' && results[i] !== '1' && results[i] !== '3') {
                        allCorrect = false;
                        break;
                    }
                }
                
                if (allCorrect) {
                    correctCount++;
                } else {
                    wrongCount++;
                }
            });
            
            sessionStatsElement.textContent = `${totalWords}/${currentWordNum}/${correctCount}r/${wrongCount}w`;
        }

        // Khởi tạo ứng dụng
        function initApp() {
            // Lấy danh sách từ
            words = getWordsToType();
            if (words.length === 0) {
                showError('Không có từ để luyện gõ');
                return;
            }

            // Cập nhật tốc độ đọc
            speedBtn.textContent = `${speechRate}x`;

            // Thêm event listeners
            document.addEventListener('keydown', handleKeyPress);
            inputDisplayElement.addEventListener('click', focusHiddenInput);
            inputDisplayElement.addEventListener('touchstart', focusHiddenInput);
            speakBtn.addEventListener('click', speakWord);
            vnBtn.addEventListener('click', toggleVnDisplay);
            enBtn.addEventListener('click', toggleEnDisplay);
            nextBtn.addEventListener('click', goToNextWord);
            finishBtn.addEventListener('click', finishSession);
            
            // Xử lý input ẩn
            hiddenInput.addEventListener('input', handleHiddenInput);
            hiddenInput.addEventListener('blur', function() {
                // Trên mobile, khi bàn phím ẩn, tự động focus lại
                if (!isCompleted) {
                    setTimeout(focusHiddenInput, 100);
                }
            });

            // Speed options
            speedOptions.forEach(option => {
                option.addEventListener('click', function(e) {
                    e.stopPropagation();
                    speechRate = parseFloat(this.getAttribute('data-speed'));
                    speedBtn.textContent = `${speechRate}x`;
                    localStorage.setItem('speechRate', speechRate.toString());
                    dropdown.classList.remove('active');
                });
            });
            
            // Đóng dropdown khi click ra ngoài
            document.addEventListener('click', function(e) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('active');
                }
            });
            
            // Toggle dropdown
            speedBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.classList.toggle('active');
            });

            // Tải từ đầu tiên
            loadCurrentWord();
            
            // Focus input ẩn ngay lập tức để bàn phím hiện lên
            setTimeout(focusHiddenInput, 300);
        }

        // Tải từ hiện tại
        function loadCurrentWord() {
            currentWord = words[currentWordIndex];
            isCompleted = false;
            hasSpoken = false;
            

            // Cập nhật nội dung các phần tử
            wordEnElement.textContent = currentWord.w || '';
            meaningElement.textContent = currentWord.m || '';
            phoneticElement.textContent = currentWord.p || '';

            // Ẩn tất cả thông tin ban đầu
            wordEnElement.classList.add('hidden');
            meaningElement.classList.add('hidden');
            phoneticElement.classList.add('hidden');
            isVnVisible = false;
            isEnVisible = false;
            vnBtn.classList.remove('active');
            enBtn.classList.remove('active');

            // Tách từ thành các chữ cái
            currentLetters = currentWord.w.split('');

            // Khởi tạo kết quả - ký tự đặc biệt được đánh dấu là 4 (đã hoàn thành)
            resultProgress = currentLetters.map(letter => 
                isSpecialChar(letter) ? 4 : 0
            );

            // Tìm vị trí đầu tiên không phải ký tự đặc biệt
            currentLetterIndex = 0;
            while (currentLetterIndex < currentLetters.length && 
                   isSpecialChar(currentLetters[currentLetterIndex])) {
                currentLetterIndex++;
            }

            updateInputDisplay();
            updateSessionStats();
            
            // Tự động phát âm từ
            setTimeout(speakWord, 500);
            
            // Focus vào ô input
            setTimeout(focusHiddenInput, 100);
        }

        // Cập nhật hiển thị input
        function updateInputDisplay() {
            inputDisplayElement.innerHTML = '';

            currentLetters.forEach((letter, index) => {
                const letterSpan = document.createElement('span');
                const state = resultProgress[index];
                const isCurrent = index === currentLetterIndex && !isCompleted;

                // Xử lý ký tự đặc biệt
                if (isSpecialChar(letter)) {
                    const specialChar = getSpecialCharDisplay(letter);
                    letterSpan.textContent = specialChar.display;
                    letterSpan.className = `letter ${specialChar.className}`;
                } else {
                    letterSpan.className = 'letter';
                    
                    switch (state) {
                        case 1: // đúng ngay
                            letterSpan.textContent = letter;
                            letterSpan.classList.add('correct');
                            break;
                        case 2: // sai
                            letterSpan.textContent = '_';
                            letterSpan.classList.add('incorrect');
                            break;
                        case 3: // sửa sai thành đúng
                            letterSpan.textContent = letter;
                            letterSpan.classList.add('fixed');
                            break;
                        case 0: // chưa gõ
                        default:
                            letterSpan.textContent = '_';
                            break;
                    }

                    if (isCurrent) letterSpan.classList.add('current');
                }

                inputDisplayElement.appendChild(letterSpan);
            });

            // Kiểm tra hoàn thành từ (chỉ kiểm tra các ký tự không phải đặc biệt)
            const allTyped = resultProgress.every((state, index) => 
                isSpecialChar(currentLetters[index]) || state !== 0
            );
            
            if (allTyped && !isCompleted) {
                isCompleted = true;
                
                // Lưu kết quả THỰC TẾ vào wordResults
                wordResults[currentWordIndex] = resultProgress.join(',');
                
                // Phát âm thanh khi hoàn thành từ
                setTimeout(speakWord, 300);
                
                wordEnElement.classList.remove('hidden');
                meaningElement.classList.remove('hidden');
                phoneticElement.classList.remove('hidden');
                isEnVisible=true;isVnVisible=true;
                enBtn.classList.add('active');
                vnBtn.classList.add('active');
                updateSessionStats();
            }
        }

        // Xử lý gõ phím với khả năng chấp nhận phím gần kề
        function handleTyping(typedChar) {
            if (currentLetterIndex >= currentLetters.length || isCompleted) return;

            // Bỏ qua nếu đây là ký tự đặc biệt (đã được xử lý tự động)
            if (isSpecialChar(currentLetters[currentLetterIndex])) {
                // Chuyển đến ký tự tiếp theo không phải đặc biệt
                currentLetterIndex++;
                while (currentLetterIndex < currentLetters.length && 
                       isSpecialChar(currentLetters[currentLetterIndex])) {
                    currentLetterIndex++;
                }
                updateInputDisplay();
                focusHiddenInput();
                return;
            }

            const correctChar = currentLetters[currentLetterIndex].toLowerCase();
            let isCorrect = typedChar === correctChar;

            // Nếu gõ sai nhưng là phím gần kề thì vẫn tính là đúng
            if (!isCorrect && adjacentKeys[correctChar] && adjacentKeys[correctChar].includes(typedChar)) {
                isCorrect = true;
            }

            const currentState = resultProgress[currentLetterIndex];

            if (currentState === 0) {
                // Lần đầu gõ
                if (isCorrect) {
                    resultProgress[currentLetterIndex] = 1; // đúng ngay
                } else {
                    resultProgress[currentLetterIndex] = 2; // sai
                }
            } else if (currentState === 2 && isCorrect) {
                // Đã sai rồi, giờ gõ đúng → trạng thái 3
                resultProgress[currentLetterIndex] = 3;
            }

            // Chỉ chuyển sang chữ tiếp theo khi đã gõ đúng (1 hoặc 3)
            if (resultProgress[currentLetterIndex] === 1 || resultProgress[currentLetterIndex] === 3) {
                currentLetterIndex++;
                
                // Bỏ qua các ký tự đặc biệt tiếp theo
                while (currentLetterIndex < currentLetters.length && 
                       isSpecialChar(currentLetters[currentLetterIndex])) {
                    currentLetterIndex++;
                }
            }

            updateInputDisplay();
            focusHiddenInput();
        }

        // Xử lý phím từ người dùng
        function handleKeyPress(event) {
            if (event.key.length === 1 && /[a-zA-Z]/.test(event.key)) {
                handleTyping(event.key.toLowerCase());
                event.preventDefault();
            }
        }

        // Xử lý input ẩn
        function handleHiddenInput(event) {
            const value = event.target.value.toLowerCase();
            if (value.length > 0 && !isCompleted) {
                handleTyping(value.charAt(0));
                event.target.value = '';
            }
        }

        // Focus input ẩn
        function focusHiddenInput() {
            if (!isCompleted) {
                hiddenInput.focus();
                // Thử kích hoạt bàn phím ảo trên mobile
                if (window.visualViewport) {
                    hiddenInput.setAttribute('inputmode', 'text');
                }
            }
        }

        // Chuyển đến từ tiếp theo
        function goToNextWord() {
            window.speechSynthesis.cancel();
            if (currentWordIndex < words.length - 1) {
                currentWordIndex++;
                loadCurrentWord();
            }
            focusHiddenInput();
        }

        // Kết thúc phiên học
        function finishSession() {
            // Đảm bảo tất cả các từ đều có kết quả
            words.forEach((word, index) => {
                if (!wordResults[index]) {
                    // Nếu từ chưa có kết quả (chưa hoàn thành), tạo kết quả mặc định
                    const defaultResult = word.w.split('').map(letter => 
                        isSpecialChar(letter) ? '4' : '2'
                    ).join(',');
                    wordResults[index] = defaultResult;
                }
            });

            // Lưu kết quả và chuyển hướng
            const resultsData = {
                words: words,
                results: wordResults,
                timestamp: Date.now()
            };
            
            try {
                localStorage.setItem('typingResults', JSON.stringify(resultsData));
                window.location.href = 'savtyp.html';
            } catch (error) {
                console.error('Lỗi khi lưu kết quả:', error);
                alert('Có lỗi xảy ra khi lưu kết quả!');
                window.location.href = 'chotyp.html';
            }
        }

        // Hiển thị lỗi
        function showError(message) {
            inputDisplayElement.innerHTML = `
                <div style="color: #f44336; text-align: center; padding: 40px;">
                    <h3>❌ ${message}</h3>
                    <button onclick="window.location.href='chotyp.html'" style="margin-top: 15px; padding: 10px 20px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer;">
                        Quay lại chọn từ
                    </button>
                </div>
            `;
        }

        // Hiển thị/ẩn tiếng Việt
        function toggleVnDisplay() {
            isVnVisible = !isVnVisible;
            if (isVnVisible) {
                meaningElement.classList.remove('hidden');
                vnBtn.classList.add('active');
            } else {
                meaningElement.classList.add('hidden');
                vnBtn.classList.remove('active');
            }
        }

        // Hiển thị/ẩn từ tiếng Anh và phiên âm
        function toggleEnDisplay() {
            isEnVisible = !isEnVisible;
            if (isEnVisible) {
                wordEnElement.classList.remove('hidden');
                phoneticElement.classList.remove('hidden');
                enBtn.classList.add('active');
            } else {
                wordEnElement.classList.add('hidden');
                phoneticElement.classList.add('hidden');
                enBtn.classList.remove('active');
            }
        }

        // Đọc từ tiếng Anh
        function speakWord() {
            if (!currentWord) return;
            
            const word = currentWord.w;
            if (!word) return;
            
            if (!('speechSynthesis' in window)) {
                console.log('Trình duyệt không hỗ trợ Text-to-Speech');
                return;
            }

            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = speechRate;
            
            hasSpoken = true;
            window.speechSynthesis.cancel();
            
            try {
                window.speechSynthesis.speak(utterance);
            } catch (error) {
                console.log('Lỗi phát âm thanh:', error);
                hasSpoken = false;
            }
        }

        // Khởi chạy ứng dụng
        document.addEventListener('DOMContentLoaded', initApp);
 document.body.addEventListener('click',function(e){if(!isCompleted)return;if(e.target.closest('.controls'))return;if(currentWordIndex<words.length-1)goToNextWord();else finishSession();});
    </script>
</body>
</html>
